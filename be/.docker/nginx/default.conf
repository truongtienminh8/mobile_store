server {
    listen 80;
    server_name localhost;
    root /var/www/public;
    index index.php index.html;

    client_max_body_size 100M;

    # ============================
    # GLOBAL CORS (fix hoàn toàn)
    # ============================
    # add_header Access-Control-Allow-Origin "http://localhost:5173" always;
    # add_header Access-Control-Allow-Credentials "true" always;
    # add_header Access-Control-Allow-Methods "GET, POST, PUT, PATCH, DELETE, OPTIONS" always;
    # add_header Access-Control-Allow-Headers "Content-Type, Authorization, X-Requested-With, Accept" always;

    # Trả lời preflight OPTIONS
    # if ($request_method = OPTIONS) {
    #     return 204;
    # }

    # ============================
    # Laravel Front Controller
    # ============================
    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    # ============================
    # PHP-FPM Handler
    # ============================
    location ~ \.php$ {
        try_files $uri =404;

        fastcgi_split_path_info ^(.+\.php)(/.+)$;
        fastcgi_pass php:9000;
        fastcgi_index index.php;

        include fastcgi_params;

        fastcgi_param SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
        fastcgi_param DOCUMENT_ROOT $realpath_root;
#thêm 4 dòng dưới đây
        fastcgi_pass_header Access-Control-Allow-Origin;
        fastcgi_pass_header Access-Control-Allow-Credentials;
        fastcgi_pass_header Access-Control-Allow-Methods;
        fastcgi_pass_header Access-Control-Allow-Headers;
    }

    # Block .htaccess, env files
    location ~ /\.(?!well-known).* {
        deny all;
    }
}
